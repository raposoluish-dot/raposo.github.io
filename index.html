<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Treino</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FFFFFF;
    --card: #F1F1F3;
    --card-hover: #E8E8EB;
    --ink: #0A0A0B;
    --ink-soft: #6E6E76;
    --line: rgba(10,10,11,0.08);
    --icon-bg: rgba(10,10,11,0.06);
  }
  body.dark{
    --bg: #0A0A0B;
    --card: #18181B;
    --card-hover: #202024;
    --ink: #F5F5F7;
    --ink-soft: #8A8A92;
    --line: rgba(255,255,255,0.08);
    --icon-bg: rgba(255,255,255,0.07);
  }

  *{ box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    transition: background 0.3s ease, color 0.3s ease;
    overflow-x: hidden;
  }

  /* ---------- theme toggle (floating, no header) ---------- */
  .theme-fab{
    position: fixed;
    top: 20px;
    right: 20px;
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 50;
    transition: background 0.2s ease, transform 0.15s ease;
  }
  .theme-fab:active{ transform: scale(0.92); }
  .theme-fab svg{ width: 18px; height: 18px; stroke: var(--ink); }

  /* ---------- grid (home) ---------- */
  .wrap{
    max-width: 640px;
    margin: 0 auto;
    padding: 84px 18px 40px;
  }
  .grid{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .card{
    grid-column: span 1;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 26px;
    padding: 20px 18px 18px;
    min-height: 178px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    position: relative;
    transition: background 0.2s ease, transform 0.15s ease;
  }
  .card:active{ transform: scale(0.97); background: var(--card-hover); }
  .card.wide{ grid-column: span 2; min-height: 118px; flex-direction: row; align-items: center; justify-content: flex-start; gap: 16px; }
  .card.wide .card-icon{ margin-bottom: 0; }
  .card.wide .card-body{ flex: 1; }
  .card.wide .card-go{ position: static; margin-left: auto; }

  .card-icon{
    width: 44px; height: 44px;
    border-radius: 14px;
    background: var(--icon-bg);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 22px;
  }
  .card-icon svg{ width: 22px; height: 22px; stroke: var(--ink); fill: none; }

  .card-body .day{
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }
  .card-body .focus{
    font-size: 15px;
    font-weight: 700;
    line-height: 1.25;
    color: var(--ink);
  }

  .card-go{
    position: absolute;
    right: 16px;
    bottom: 16px;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card-go svg{ width: 13px; height: 13px; stroke: var(--ink); }

  /* ---------- detail view ---------- */
  .detail{
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(.32,.72,0,1);
  }
  .detail.open{ transform: translateY(0); }

  .detail-inner{
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 22px 60px;
  }
  .back-btn{
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    margin-bottom: 26px;
  }
  .back-btn svg{ width: 17px; height: 17px; stroke: var(--ink); }

  .detail-icon{
    width: 56px; height: 56px;
    border-radius: 16px;
    background: var(--icon-bg);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 18px;
  }
  .detail-icon svg{ width: 28px; height: 28px; stroke: var(--ink); fill: none; }

  .detail-day{
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .detail-title{
    font-size: 26px;
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 6px;
  }
  .detail-sub{
    font-size: 13.5px;
    color: var(--ink-soft);
    font-weight: 500;
    margin-bottom: 30px;
  }

  .group-label{
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.3px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 26px 0 10px;
  }
  .group-label:first-of-type{ margin-top: 0; }

  .ex-row{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 0;
    border-bottom: 1px solid var(--line);
    gap: 10px;
  }
  .ex-row:last-child{ border-bottom: none; }
  .ex-name{ font-size: 14.5px; font-weight: 600; color: var(--ink); }
  .ex-meta{ font-size: 13px; font-weight: 600; color: var(--ink-soft); white-space: nowrap; }

  .run-block p{
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--ink);
    font-weight: 500;
    margin-bottom: 16px;
  }
  .run-block b{ font-weight: 700; }

  .foot-mini{
    margin-top: 20px;
    font-size: 11.5px;
    color: var(--ink-soft);
    font-style: italic;
  }

  .start-btn{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    margin-top: 36px;
    padding: 16px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 999px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 14.5px;
    letter-spacing: 0.3px;
    cursor: pointer;
  }
  .start-btn:active{ opacity: 0.85; }
  .start-btn svg{ width: 16px; height: 16px; stroke: var(--bg); }

  /* ---------- guided workout ---------- */
  .guided{
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(.32,.72,0,1);
  }
  .guided.open{ transform: translateX(0); }

  .guided-top{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 22px 0;
    flex-shrink: 0;
  }
  .guided-close{
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .guided-close svg{ width: 15px; height: 15px; stroke: var(--ink); }
  .guided-progress{
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--ink-soft);
  }

  .guided-body{
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 32px 30px;
    text-align: center;
  }
  .guided-illustration{
    width: 220px; height: 220px;
    max-width: 60vw; max-height: 60vw;
    border-radius: 32px;
    background: var(--card);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 32px;
  }
  .guided-illustration svg{ width: 62%; height: 62%; stroke: var(--ink); fill: none; }
  .guided-name{
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .guided-category{
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 26px;
  }
  .guided-meta{
    font-size: 14.5px;
    font-weight: 700;
    color: var(--ink);
    background: var(--card);
    border: 1px solid var(--line);
    padding: 10px 22px;
    border-radius: 999px;
  }

  .guided-nav{
    padding: 0 22px 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    flex-shrink: 0;
  }
  .guided-arrow{
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--ink);
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .guided-arrow:active{ opacity: 0.85; }
  .guided-arrow svg{ width: 24px; height: 24px; stroke: var(--bg); }

  .guided-complete{
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    padding: 0 34px;
  }
  .guided-complete-icon{
    width: 84px; height: 84px;
    border-radius: 50%;
    background: var(--ink);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
  }
  .guided-complete-icon svg{ width: 36px; height: 36px; stroke: var(--bg); }
  .guided-complete h2{ font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .guided-complete p{ font-size: 13.5px; color: var(--ink-soft); font-weight: 500; margin-bottom: 30px; }
  .guided-complete-btn{
    background: var(--ink);
    color: var(--bg);
    border: none;
    padding: 15px 36px;
    border-radius: 999px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
</style>
</head>
<body>

  <button class="theme-fab" id="themeFab" onclick="toggleTheme()" aria-label="Alternar tema">
    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>

  <div class="wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="detail" id="detail">
    <div class="detail-inner" id="detailInner"></div>
  </div>

  <div class="guided" id="guided">
    <div class="guided-top">
      <div class="guided-close" onclick="closeGuided()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg></div>
      <div class="guided-progress" id="guidedProgress"></div>
    </div>
    <div class="guided-body" id="guidedBody"></div>
    <div class="guided-nav" id="guidedNav">
      <button class="guided-arrow" onclick="guidedNext()" aria-label="Próximo">
        <svg id="guidedArrowIcon" viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>
    </div>
    <div class="guided-complete" id="guidedCompleteScreen">
      <div class="guided-complete-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></div>
      <h2>Treino concluído</h2>
      <p>Bom trabalho. Descanse e hidrate-se.</p>
      <button class="guided-complete-btn" onclick="finishGuided()">Voltar</button>
    </div>
  </div>

        ]},
        { label: 'Posterior de coxa', items: [
          ['Stiff','4×8–10','deadlift_hinge'],['Flexora sentada','4×8–10','leg_curl']
        ]},
        { label: 'Glúteo e adutor', items: [
          ['Sumô','4×8–10','sumo_squat'],['Abdutora','4×8–10','hip_machine'],['Cadeira adutora','4×8–10','hip_machine']
        ]},
        { label: 'Lombar e panturrilha', items: [
          ['Extensão lombar banco 45°','4×8–10','back_extension'],['Panturrilha no leg press','4×15','calf_raise'],['Elevação de panturrilha c/ halter','3×15–20','calf_raise']
        ]},
        { label: 'Abdômen', items: [
          ['Elevação de pernas (solo)','3×15–20','leg_raise'],['Abdominal bicicleta','3×20','bicycle_crunch']
        ]}
      ],
      foot: '*reps por perna'
    },
    {
      id: 'sex', day: 'Sexta', focus: 'Corrida Intervalada Leve', sub: 'Condicionamento sem competir com a recuperação',
      icon: 'bolt', wide: true, runMeta: '28 min',
      run: [
        { b: 'Aquecimento:', t: ' 5 min trote leve.' },
        { b: 'Estímulo:', t: ' 6× (1 min forte + 2 min trote leve) — 18 min.' },
        { b: 'Volta à calma:', t: ' 5 min.' },
        { b: 'Total:', t: ' 28 minutos.' }
      ]
    }
  ];

  // ---------- render grid ----------
  function renderGrid(){
    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    DAYS.forEach(function(d){
      var el = document.createElement('div');
      el.className = 'card' + (d.wide ? ' wide' : '');
      el.onclick = function(){ openDay(d.id); };
      el.innerHTML =
        '<div class="card-icon"><svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' + ICONS[d.icon] + '</svg></div>' +
        '<div class="card-body">' +
          '<div class="day">' + d.day + '</div>' +
          '<div class="focus">' + d.focus + '</div>' +
        '</div>' +
        '<div class="card-go"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>';
      grid.appendChild(el);
    });
  }

  // ---------- detail view ----------
  function openDay(id){
    var d = DAYS.filter(function(x){ return x.id === id; })[0];
    if(!d) return;
    var inner = document.getElementById('detailInner');
    var html =
      '<div class="back-btn" onclick="closeDay()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 6l-6 6 6 6"/></svg></div>' +
      '<div class="detail-icon"><svg viewBox="0 0 24 24" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">' + ICONS[d.icon] + '</svg></div>' +
      '<div class="detail-day">' + d.day + '</div>' +
      '<div class="detail-title">' + d.focus + '</div>' +
      '<div class="detail-sub">' + d.sub + '</div>';

    if(d.run){
      html += '<div class="run-block">' + d.run.map(function(l){
        return '<p><b>' + l.b + '</b>' + l.t + '</p>';
      }).join('') + '</div>';
    } else if(d.groups){
      d.groups.forEach(function(g){
        html += '<div class="group-label">' + g.label + '</div>';
        g.items.forEach(function(it){
          html += '<div class="ex-row"><div class="ex-name">' + it[0] + '</div><div class="ex-meta">' + it[1] + '</div></div>';
        });
      });
      if(d.foot){ html += '<div class="foot-mini">' + d.foot + '</div>'; }
    }

    html += '<button class="start-btn" onclick="startGuided(\'' + d.id + '\')">Iniciar treino<svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>';

    inner.innerHTML = html;
    document.getElementById('detail').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeDay(){
    document.getElementById('detail').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ---------- guided workout ----------
  var guided = { steps: [], index: 0 };

  function getSteps(d){
    if(d.run){
      var runIcon = d.icon === 'bolt' ? 'run_interval' : 'run_easy';
      return [{ name: d.focus, category: 'Corrida', meta: d.runMeta || '', icon: runIcon }];
    }
    var steps = [];
    d.groups.forEach(function(g){
      g.items.forEach(function(it){
        steps.push({ name: it[0], meta: it[1], icon: it[2] || 'dumbbell', category: g.label });
      });
    });
    return steps;
  }

  function startGuided(id){
    var d = DAYS.filter(function(x){ return x.id === id; })[0];
    if(!d) return;
    guided.steps = getSteps(d);
    guided.index = 0;
    document.getElementById('guidedBody').style.display = '';
    document.getElementById('guidedNav').style.display = '';
    document.getElementById('guidedCompleteScreen').style.display = 'none';
    renderGuidedStep();
    document.getElementById('guided').classList.add('open');
  }

  function renderGuidedStep(){
    var total = guided.steps.length;
    var s = guided.steps[guided.index];
    document.getElementById('guidedProgress').textContent = (guided.index + 1) + ' / ' + total;
    document.getElementById('guidedBody').innerHTML =
      '<div class="guided-illustration"><svg viewBox="0 0 24 24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' + EXICONS[s.icon] + '</svg></div>' +
      '<div class="guided-name">' + s.name + '</div>' +
      '<div class="guided-category">' + s.category + '</div>' +
      '<div class="guided-meta">' + s.meta + '</div>';
    var isLast = guided.index === total - 1;
    document.getElementById('guidedArrowIcon').innerHTML = isLast
      ? '<path d="M5 13l4 4L19 7"/>'
      : '<path d="M5 12h14M13 6l6 6-6 6"/>';
  }

  function guidedNext(){
    if(guided.index < guided.steps.length - 1){
      guided.index++;
      renderGuidedStep();
    } else {
      document.getElementById('guidedBody').style.display = 'none';
      document.getElementById('guidedNav').style.display = 'none';
      document.getElementById('guidedCompleteScreen').style.display = 'flex';
    }
  }

  function guidedPrev(){
    if(guided.index > 0){
      guided.index--;
      renderGuidedStep();
    }
  }

  function closeGuided(){
    document.getElementById('guided').classList.remove('open');
  }

  function finishGuided(){
    closeGuided();
    closeDay();
  }

  (function(){
    var startX = null;
    var g = document.getElementById('guided');
    g.addEventListener('touchstart', function(e){ startX = e.touches[0].clientX; });
    g.addEventListener('touchend', function(e){
      if(startX === null) return;
      var dx = e.changedTouches[0].clientX - startX;
      if(Math.abs(dx) > 50){
        if(dx < 0){ guidedNext(); } else { guidedPrev(); }
      }
      startX = null;
    });
  })();

  // ---------- theme ----------
  function applyTheme(isDark){
    document.body.classList.toggle('dark', isDark);
    document.getElementById('themeIcon').innerHTML = isDark ? MOON : SUN;
  }

  async function toggleTheme(){
    var isDark = !document.body.classList.contains('dark');
    applyTheme(isDark);
    try{ await window.storage.set('theme-pref', isDark ? 'dark' : 'light', false); }catch(e){}
  }

  async function loadTheme(){
    try{
      var t = await window.storage.get('theme-pref', false);
      applyTheme(t && t.value === 'dark');
    }catch(e){
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(!!prefersDark);
    }
  }

  renderGrid();
  loadTheme();
</script>

</body>
</html>
